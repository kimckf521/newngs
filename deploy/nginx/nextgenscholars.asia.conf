# /etc/nginx/sites-available/nextgenscholars.asia
# Place this file at the path above on the server, then:
#   sudo ln -s /etc/nginx/sites-available/nextgenscholars.asia /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Get TLS certs with:
#   sudo certbot --nginx -d nextgenscholars.asia -d www.nextgenscholars.asia

upstream ngs_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name nextgenscholars.asia www.nextgenscholars.asia;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nextgenscholars.asia www.nextgenscholars.asia;

    ssl_certificate     /etc/letsencrypt/live/nextgenscholars.asia/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nextgenscholars.asia/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Body size for the contact form
    client_max_body_size 5m;

    # Compress text responses
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Serve Next.js built static assets directly (skip Node)
    location /_next/static/ {
        alias /var/www/ngs/current/.next/static/;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Serve public/static/* directly (images, fonts, videos)
    location /static/ {
        alias /var/www/ngs/current/public/static/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Favicon, robots, sitemap also from public/
    location = /favicon.ico {
        alias /var/www/ngs/current/public/favicon.ico;
        access_log off;
    }
    location = /robots.txt {
        alias /var/www/ngs/current/public/robots.txt;
        access_log off;
    }

    # Everything else -> Next.js server (SSR + API routes + sitemap.xml)
    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://ngs_web;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
